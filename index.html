<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>易简清单</title>
  <style>
    html,
    body,
    #app {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #f7fbfa;
      color: #17211f;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .boot-screen {
      display: grid;
      place-items: center;
      width: 100%;
      height: 100%;
    }

    .boot-card {
      display: grid;
      justify-items: center;
      gap: 12px;
      color: #687674;
      font-size: 14px;
    }

    .boot-logo {
      display: grid;
      place-items: center;
      width: 64px;
      height: 64px;
      border-radius: 18px;
      background: #e2f4f1;
      color: #1f7d76;
      font-size: 34px;
      font-weight: 800;
      box-shadow: inset 0 0 0 1px #c7e7e2;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="boot-screen">
      <div class="boot-card">
        <div class="boot-logo">✓</div>
        <strong>易简清单</strong>
        <span>正在加载本地数据...</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
