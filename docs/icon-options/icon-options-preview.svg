<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1440" height="900" fill="#F6F8F7"/>
  <text x="80" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="38" font-weight="800" fill="#17211F">易简清单 App 图标候选</text>
  <text x="80" y="132" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="500" fill="#687674">A 偏当前图标优化，B 更像清单文件，C 小尺寸最清爽，D 强调收集箱和完成。</text>
  <g transform="translate(80 190)">
    <rect width="292" height="440" rx="28" fill="#FFFFFF" stroke="#E2E8E6"/>
    <image href="icon-option-a-check-card.svg" x="46" y="38" width="200" height="200"/>
    <text x="34" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#17211F">A</text>
    <text x="76" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="750" fill="#17211F">清单卡片</text>
    <text x="34" y="344" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">保留待办语义，视觉比当前更干净。</text>
    <text x="34" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">适合桌面 Dock 和侧栏品牌位。</text>
  </g>
  <g transform="translate(406 190)">
    <rect width="292" height="440" rx="28" fill="#FFFFFF" stroke="#E2E8E6"/>
    <image href="icon-option-b-folded-list.svg" x="46" y="38" width="200" height="200"/>
    <text x="34" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#17211F">B</text>
    <text x="76" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="750" fill="#17211F">折角清单</text>
    <text x="34" y="344" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">更像一个本地清单文件。</text>
    <text x="34" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">识别度强，细节比 A 更丰富。</text>
  </g>
  <g transform="translate(732 190)">
    <rect width="292" height="440" rx="28" fill="#FFFFFF" stroke="#E2E8E6"/>
    <image href="icon-option-c-minimal-check.svg" x="46" y="38" width="200" height="200"/>
    <text x="34" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#17211F">C</text>
    <text x="76" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="750" fill="#17211F">极简完成</text>
    <text x="34" y="344" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">小尺寸最清晰，偏效率工具。</text>
    <text x="34" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">不强调具体清单容器。</text>
  </g>
  <g transform="translate(1058 190)">
    <rect width="292" height="440" rx="28" fill="#FFFFFF" stroke="#E2E8E6"/>
    <image href="icon-option-d-inbox-check.svg" x="46" y="38" width="200" height="200"/>
    <text x="34" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30" font-weight="800" fill="#17211F">D</text>
    <text x="76" y="302" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" font-weight="750" fill="#17211F">收集箱完成</text>
    <text x="34" y="344" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">和任务收集、处理关系更明显。</text>
    <text x="34" y="374" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="17" fill="#687674">视觉更稳，图形较厚重。</text>
  </g>
  <g transform="translate(80 686)">
    <rect width="1270" height="116" rx="26" fill="#FFFFFF" stroke="#E2E8E6"/>
    <text x="34" y="46" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="750" fill="#17211F">选择建议</text>
    <text x="34" y="82" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" fill="#687674">想稳妥延续当前方向选 A；想更有本地文件感选 B；想在 Dock 小尺寸里最清楚选 C；想让“收集箱/完成”语义更强选 D。</text>
  </g>
</svg>
